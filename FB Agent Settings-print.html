<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>FB Agent · Settings — print</title>
<link rel="stylesheet" href="styles.css"/>
<link rel="stylesheet" href="settings.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="sidebar.jsx"></script>
<script type="text/babel" src="settings.jsx"></script>
<style>
  /* Each page is the artboard size, scaled to fit landscape A4 */
  :root {
    --pw: 1440px;
    --ph: 1280px;
  }
  html, body {
    margin: 0;
    padding: 0;
    background: #d8d8d2;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .print-page {
    width: var(--pw);
    height: var(--ph);
    margin: 24px auto;
    background: white;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    overflow: hidden;
    position: relative;
    page-break-after: always;
    break-after: page;
    page-break-inside: avoid;
    break-inside: avoid;
  }
  .print-page:last-child {
    page-break-after: auto;
    break-after: auto;
  }
  .print-label {
    position: absolute;
    top: 12px;
    left: 16px;
    z-index: 50;
    font: 600 11px/1 -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
    color: #6b7280;
    background: rgba(255,255,255,0.85);
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid #e5e7eb;
    letter-spacing: 0.02em;
  }
  /* Hide the inner settings page border-radius/border so it fills the print page */
  .print-page .af-settings {
    border-radius: 0;
    border: none;
    width: 100%;
    height: 100%;
  }

  @page {
    size: 1488px 1328px;
    margin: 0;
  }
  @media print {
    html, body { background: white; }
    .print-page {
      margin: 24px auto;
      box-shadow: none;
      page-break-after: always;
      break-after: page;
    }
    .print-label { display: none; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { SettingsPage } = window;

const pages = [
  { id: 'all-configured', label: 'A · All configured', el: <SettingsPage scenario="configured"/> },
  { id: 'wizard',         label: 'B · First-time wizard', el: <SettingsPage scenario="wizard"/> },
  { id: 'mid',            label: 'C · Mid-setup · pixel in focus', el: <SettingsPage scenario="mid"/> },
  { id: 'complete',       label: 'D · 5 of 5 complete', el: <SettingsPage scenario="complete"/> },
  { id: 'new-workspace',  label: 'E · New Workspace modal', el: <SettingsPage scenario="configured" initialModal="workspace"/> },
  { id: 'invite-member',  label: 'F · Invite Member modal', el: <SettingsPage scenario="configured" initialModal="invite"/> },
];

function App() {
  return (
    <React.Fragment>
      {pages.map(p => (
        <div key={p.id} className="print-page" id={`page-${p.id}`}>
          <div className="print-label">{p.label}</div>
          {p.el}
        </div>
      ))}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// Auto-print after fonts/JSX/layout settle
(async () => {
  if (document.fonts && document.fonts.ready) {
    try { await document.fonts.ready; } catch (e) {}
  }
  // Wait two RAFs so React commits + layout
  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
  await new Promise(r => setTimeout(r, 600));
  window.print();
})();
</script>
</body>
</html>
