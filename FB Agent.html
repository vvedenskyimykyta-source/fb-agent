<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<title>AdFactory · FB Agent — концепты</title>
<link rel="stylesheet" href="styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="sidebar.jsx"></script>
<script type="text/babel" src="topbar.jsx"></script>
<script type="text/babel" src="chat.jsx"></script>
<script type="text/babel" src="panel.jsx"></script>
<script type="text/babel" src="launch-modal.jsx"></script>
<script type="text/babel" src="fb-agent.jsx"></script>
<style>
  body { background: #f0eee9; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { FBAgent } = window;

function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="hero"
        title="FB Agent · v2 концепт"
        subtitle="Гибрид чата и структурированной панели · 4 состояния флоу + модалка превью"
      >
        <DCArtboard id="ready" label="2 · Драфт готов · 11 адсетов в панели" width={1440} height={900}>
          <FBAgent initialPhase="ready" initialOpenIdx={0}/>
        </DCArtboard>

        <DCArtboard id="drafting" label="1 · Агент готовит драфт · скелетон + статус-бар" width={1440} height={900}>
          <FBAgent initialPhase="drafting" initialOpenIdx={-1}/>
        </DCArtboard>

        <DCArtboard id="preview" label="3 · Модалка превью перед запуском" width={1440} height={900}>
          <FBAgent initialPhase="previewing" initialOpenIdx={-1}/>
        </DCArtboard>

        <DCArtboard id="launched" label="4 · Запущено · 11/11 адсетов активны в Meta" width={1440} height={900}>
          <FBAgent initialPhase="launched" initialOpenIdx={-1}/>
        </DCArtboard>

        <DCArtboard id="fresh" label="0 · Пустое состояние · до первого запроса" width={1440} height={900}>
          <FBAgent initialPhase="fresh" initialOpenIdx={-1}/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="notes"
        title="Дизайн-решения"
        subtitle="Что меняется по сравнению с текущим General Chat"
      >
        <DCPostIt width={300} height={200}>
          <strong>Сплит 40/60</strong><br/><br/>
          Чат остаётся ядром (слева), но рядом — панель Ads-Manager-like. Чат и панель синхронизированы: правки в полях обновляют контекст агента, ответы агента заполняют поля.
        </DCPostIt>

        <DCPostIt width={300} height={200}>
          <strong>Статус-бар вместо «processing…»</strong><br/><br/>
          Конкретные шаги: «Шаг 2 из 4: подтягиваю креативы из 11 тасков». Чекпоинты-tick'и показывают прогресс. Никаких «несколько минут» вслепую.
        </DCPostIt>

        <DCPostIt width={300} height={200}>
          <strong>Чипы вместо длинных промптов</strong><br/><br/>
          Над инпутом — структурированные переключатели (Web/App, iOS/Android, выбор референса из dropdown). Текст остаётся, но 80% задач — клики.
        </DCPostIt>

        <DCPostIt width={300} height={200}>
          <strong>Один «Запустить» вместо трёх команд</strong><br/><br/>
          Кнопка в шапке. Превью-модалка → таски Review→Active + адсеты ON в Meta атомарно. Откат — из истории сессии.
        </DCPostIt>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
